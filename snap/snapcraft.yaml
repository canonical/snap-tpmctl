name: snap-tpmctl
base: core24
adopt-info: version
summary: Ubuntu TPM and FDE management tool
title: Snap TPM/FDE Control Tool
description: |
  snap-tpmctl is a command-line tool for managing TPM (Trusted Platform Module)
  and Full Disk Encryption (FDE) features on Ubuntu systems. It provides commands
  for managing recovery keys, PINs, passphrases, and encrypted volume operations.
license: GPL-3.0
issues: https://github.com/canonical/snap-tpmctl/issues
source-code: https://github.com/canonical/snap-tpmctl

grade: stable
confinement: strict

apps:
  snap-tpmctl:
    command: bin/snap-tpmctl
    completer: completion.sh
    plugs:
      - block-devices
      - dm-crypt
      - hardware-observe
      - mountctl
      - mount-observe
      - network
      - snapd-control
      - home

plugs:
  block-devices:
    allow-partitions: true
  mountctl:
    interface: mount-control
    mount:
      - what: /dev/**
        where: /**
        type: [ext2, ext3, ext4, xfs, vfat, ntfs]
        namespace: host
        options: [rw, relatime]

parts:
  snap-tpmctl:
    plugin: go
    source: .
    build-snaps:
      - go/latest/stable
    build-packages:
      - gcc
      - pkg-config
      - git
    override-build: |
      VERSION=$(craftctl get version)
      LDFLAGS="-X github.com/canonical/snap-tpmctl/cmd/tpmctl/cmd.Version=$VERSION"
      go build -ldflags="$LDFLAGS" -o $CRAFT_PART_INSTALL/bin/snap-tpmctl ./cmd/tpmctl
    after:
      - version

  completion-script:
    after: [snap-tpmctl]
    plugin: nil
    override-build: |
      # $CRAFT_STAGE/bin/snap-tpmctl completion bash > $CRAFT_PART_INSTALL/completion.sh

      # Override the above command to generate the completion script 
      # until the upstream completion script generation supports the 
      # strict confinement requirements of snapcraft.
      cat << 'EOF' > $CRAFT_PART_INSTALL/completion.sh
      #!/bin/bash

      __snap_tpmctl_complete() {
        local cur opts
        local words=("${COMP_WORDS[@]}")
        local cword="${COMP_CWORD}"

        COMPREPLY=()
        cur="${words[$cword]}"

        words=("${words[@]:0:$cword}")
        if [[ "$cur" == "-"* ]]; then
            requestComp="${words[*]} ${cur} --generate-shell-completion"
        else
            requestComp="${words[*]} --generate-shell-completion"
        fi

        opts=$(eval "${requestComp}" 2>/dev/null)
        COMPREPLY=($(compgen -W "${opts}" -- "${cur}"))
      }

      complete -o nospace -F __snap_tpmctl_complete snap-tpmctl
      EOF

  systemd-cryptsetup:
    plugin: nil
    stage-packages:
      # include systemd-cryptsetup binary package and all its dependencies
      - systemd
    # prime only /usr/bin/systemd-cryptsetup
    override-prime: |
      mkdir -p ${CRAFT_PRIME}/usr/bin
      cp -a ${CRAFT_STAGE}/usr/bin/systemd-cryptsetup ${CRAFT_PRIME}/usr/bin/

  # Build the snap version from the git repository and current tree state.
  version:
    source: .
    plugin: nil
    build-packages:
      - git # The script needs Git.
    override-build: |
      craftctl set version="$(./snap/version)"
